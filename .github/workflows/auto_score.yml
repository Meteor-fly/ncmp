name: Auto Score

on:
  schedule:
    - cron: '30 11 * * *'  # 19:30 Asia/Shanghai
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          TZ: Asia/Shanghai
          MUSIC_U: ${{ secrets.MUSIC_U }}
          CSRF: ${{ secrets.CSRF }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          WAIT_TIME_MIN: ${{ secrets.WAIT_TIME_MIN }}
          WAIT_TIME_MAX: ${{ secrets.WAIT_TIME_MAX }}
          SCORE: ${{ secrets.SCORE }}
          TASK_MODE: ${{ secrets.TASK_MODE }}
          FULL_EXTRA_TASKS: ${{ secrets.FULL_EXTRA_TASKS }}
          SYNC_YUN_CIRCLE: ${{ secrets.SYNC_YUN_CIRCLE }}
        run: python main.py
